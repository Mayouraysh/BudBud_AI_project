services:
  - type: web
    name: badbad-ai-subtitle
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --workers 1 --threads 4 --timeout 600 app:app
    envVars:
      - key: WHISPER_MODEL_SIZE
        value: tiny
      - key: SUBTITLE_MODE
        value: segment
      - key: MAX_UPLOAD_MB
        value: "1536"
