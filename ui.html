<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Subtitle Generator</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#0f0f0f;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            overflow:hidden;
            color:white;
        }

        .background-glow{
            position:absolute;
            width:600px;
            height:600px;
            background:radial-gradient(circle, rgba(255,255,255,0.15), transparent 70%);
            filter:blur(80px);
            z-index:0;
        }

        .container{
            position:relative;
            z-index:1;
            width:500px;
            padding:40px;
            background:rgba(28,28,28,0.8);
            backdrop-filter:blur(20px);
            border:1px solid rgba(255,255,255,0.1);
            border-radius:30px;
            text-align:center;
            box-shadow:0 0 40px rgba(0,0,0,0.5);
        }

        h1{
            font-size:42px;
            margin-bottom:10px;
            font-weight:700;
        }

        p{
            color:#bdbdbd;
            margin-bottom:35px;
            line-height:1.5;
        }

        .upload-box{
            position:relative;
            width:100%;
            height:180px;
            border:2px dashed rgba(255,255,255,0.15);
            border-radius:20px;
            display:flex;
            justify-content:center;
            align-items:center;
            flex-direction:column;
            cursor:pointer;
            transition:0.3s;
            overflow:hidden;
        }

        .upload-box:hover{
            border-color:white;
            transform:scale(1.01);
        }

        .upload-box input{
            position:absolute;
            width:100%;
            height:100%;
            opacity:0;
            cursor:pointer;
        }

        .upload-icon{
            font-size:55px;
            margin-bottom:10px;
        }

        .upload-text{
            font-size:16px;
            color:#d0d0d0;
        }

        .file-name{
            margin-top:18px;
            color:#8f8f8f;
            font-size:14px;
            word-break:break-all;
        }

        button{
            margin-top:30px;
            width:100%;
            padding:16px;
            border:none;
            border-radius:14px;
            background:white;
            color:black;
            font-size:17px;
            font-weight:bold;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            transform:translateY(-2px);
        }

        .loader{
            display:none;
            margin-top:20px;
        }

        .status-text{
            margin-top:12px;
            min-height:20px;
            color:#cfcfcf;
            font-size:14px;
        }

        .loader span{
            width:12px;
            height:12px;
            background:white;
            display:inline-block;
            border-radius:50%;
            margin:0 4px;
            animation:bounce 0.6s infinite alternate;
        }

        .loader span:nth-child(2){
            animation-delay:0.2s;
        }

        .loader span:nth-child(3){
            animation-delay:0.4s;
        }

        @keyframes bounce{
            from{
                transform:translateY(0);
                opacity:0.5;
            }

            to{
                transform:translateY(-10px);
                opacity:1;
            }
        }

    </style>
</head>
<body>

    <div class="background-glow"></div>

    <div class="container">

        <h1>बडबड AI</h1>

        <p>
            Upload your video and generate word-by-word subtitles in Hindi, English & Hinglish.
        </p>

        <form id="uploadForm">

            <label class="upload-box">

                <input 
                    type="file" 
                    id="videoInput"
                    accept="video/*"
                >

                <div class="upload-icon">🎬</div>

                <div class="upload-text">
                    Click to Upload Video
                </div>

            </label>

            <div class="file-name" id="fileName">
                No file selected
            </div>

            <button type="submit">
                Generate SRT
            </button>

            <div class="loader" id="loader">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <div class="status-text" id="statusText"></div>

        </form>

    </div>

    <script>

        const videoInput = document.getElementById("videoInput");
        const fileName = document.getElementById("fileName");
        const loader = document.getElementById("loader");
        const statusText = document.getElementById("statusText");
        const form = document.getElementById("uploadForm");
        const MAX_UPLOAD_MB = 200;
        const POLL_INTERVAL_MS = 3000;
        const MAX_POLL_TRIES = 200;

        videoInput.addEventListener("change", () => {

            if(videoInput.files.length > 0){

                fileName.textContent = videoInput.files[0].name;

            }

        });

        form.addEventListener("submit", (e) => {

            e.preventDefault();

            if(videoInput.files.length === 0){

                alert("Please upload a video first");
                return;

            }

            const selectedFile = videoInput.files[0];
            const fileSizeMb = selectedFile.size / (1024 * 1024);
            if (fileSizeMb > MAX_UPLOAD_MB) {
                alert(`Please upload a file smaller than ${MAX_UPLOAD_MB} MB.`);
                return;
            }

            statusText.textContent = "Queued...";
            loader.style.display = "block";

            const formData = new FormData();

formData.append(
    "video",
    selectedFile
);

fetch("/upload", {

    method: "POST",
    body: formData

})
.then(async response => {
    if (!response.ok) {
        let message = "Error generating subtitles";
        try {
            const payload = await response.json();
            if (payload.error) {
                message = payload.error;
            }
        } catch (e) {
            // Keep default message if response is not JSON.
        }
        throw new Error(message);
    }
    return response.json();
})
.then(payload => {
    if (!payload.job_id) {
        throw new Error("Invalid server response");
    }
    statusText.textContent = "Processing...";
    return waitForJobAndDownload(payload.job_id);
})
.then(() => {
    loader.style.display = "none";
    statusText.textContent = "Download ready.";
    fileName.textContent = "Done! Subtitle downloaded.";
})
.catch(error => {

    loader.style.display = "none";
    statusText.textContent = "";

    const fallbackMessage = "Request timed out on free hosting. Try a shorter clip (30-120 sec) or lower file size.";
    alert(error.message || fallbackMessage);

    console.log(error);

});

        });

        async function waitForJobAndDownload(jobId) {
            for (let attempt = 0; attempt < MAX_POLL_TRIES; attempt += 1) {
                const response = await fetch(`/job/${jobId}`);
                let payload = {};
                try {
                    payload = await response.json();
                } catch (e) {
                    // Keep default payload if response body is not JSON.
                }

                if (!response.ok) {
                    throw new Error(payload.error || "Unable to check job status");
                }

                if (payload.status === "done") {
                    statusText.textContent = "Download ready.";
                    const downloadUrl = payload.download_url || `/download/${jobId}`;
                    downloadFile(downloadUrl, videoInput.files[0].name);
                    return;
                }

                if (payload.status === "error") {
                    throw new Error(payload.error || "Transcription failed");
                }

                if (attempt > 0 && attempt % 8 === 0) {
                    statusText.textContent = "Still running... please wait.";
                } else if (payload.status === "processing") {
                    statusText.textContent = "Processing...";
                } else {
                    statusText.textContent = "Queued...";
                }

                await new Promise(resolve => setTimeout(resolve, POLL_INTERVAL_MS));
            }

            throw new Error("Processing took too long. Please try a shorter clip.");
        }

        function downloadFile(url, originalFileName) {
            const a = document.createElement("a");
            a.href = url;
            a.download = originalFileName.replace(/\.[^/.]+$/, "") + ".srt";
            document.body.appendChild(a);
            a.click();
            a.remove();
        }

    </script>

</body>
</html>
