<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Subtitle Generator</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#0f0f0f;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            overflow:hidden;
            color:white;
        }

        .background-glow{
            position:absolute;
            width:600px;
            height:600px;
            background:radial-gradient(circle, rgba(255,255,255,0.15), transparent 70%);
            filter:blur(80px);
            z-index:0;
        }

        .container{
            position:relative;
            z-index:1;
            width:500px;
            padding:40px;
            background:rgba(28,28,28,0.8);
            backdrop-filter:blur(20px);
            border:1px solid rgba(255,255,255,0.1);
            border-radius:30px;
            text-align:center;
            box-shadow:0 0 40px rgba(0,0,0,0.5);
        }

        h1{
            font-size:42px;
            margin-bottom:10px;
            font-weight:700;
        }

        p{
            color:#bdbdbd;
            margin-bottom:35px;
            line-height:1.5;
        }

        .upload-box{
            position:relative;
            width:100%;
            height:180px;
            border:2px dashed rgba(255,255,255,0.15);
            border-radius:20px;
            display:flex;
            justify-content:center;
            align-items:center;
            flex-direction:column;
            cursor:pointer;
            transition:0.3s;
            overflow:hidden;
        }

        .upload-box:hover{
            border-color:white;
            transform:scale(1.01);
        }

        .upload-box input{
            position:absolute;
            width:100%;
            height:100%;
            opacity:0;
            cursor:pointer;
        }

        .upload-icon{
            font-size:55px;
            margin-bottom:10px;
        }

        .upload-text{
            font-size:16px;
            color:#d0d0d0;
        }

        .file-name{
            margin-top:18px;
            color:#8f8f8f;
            font-size:14px;
            word-break:break-all;
        }

        button{
            margin-top:30px;
            width:100%;
            padding:16px;
            border:none;
            border-radius:14px;
            background:white;
            color:black;
            font-size:17px;
            font-weight:bold;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            transform:translateY(-2px);
        }

        .loader{
            display:none;
            margin-top:20px;
        }

        .status-text{
            margin-top:12px;
            min-height:20px;
            color:#cfcfcf;
            font-size:14px;
        }

        .loader span{
            width:12px;
            height:12px;
            background:white;
            display:inline-block;
            border-radius:50%;
            margin:0 4px;
            animation:bounce 0.6s infinite alternate;
        }

        .loader span:nth-child(2){
            animation-delay:0.2s;
        }

        .loader span:nth-child(3){
            animation-delay:0.4s;
        }

        @keyframes bounce{
            from{
                transform:translateY(0);
                opacity:0.5;
            }

            to{
                transform:translateY(-10px);
                opacity:1;
            }
        }

    </style>
</head>
<body>

    <div class="background-glow"></div>

    <div class="container">

        <h1>बडबड AI</h1>

        <p>
            Upload your video and generate word-by-word subtitles in Hindi, English & Hinglish.
        </p>

        <form id="uploadForm">

            <label class="upload-box">

                <input 
                    type="file" 
                    id="videoInput"
                    accept="video/*"
                >

                <div class="upload-icon">🎬</div>

                <div class="upload-text">
                    Click to Upload Video
                </div>

            </label>

            <div class="file-name" id="fileName">
                No file selected
            </div>

            <button type="submit">
                Generate SRT
            </button>

            <div class="loader" id="loader">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <div class="status-text" id="statusText"></div>

        </form>

    </div>

    <script>

        const videoInput = document.getElementById("videoInput");
        const fileName = document.getElementById("fileName");
        const loader = document.getElementById("loader");
        const statusText = document.getElementById("statusText");
        const form = document.getElementById("uploadForm");
        const POLL_INTERVAL_MS = 3000;
        const MAX_POLL_TRIES = 400;
        const MAX_STATUS_FAILURES = 20;
        const CHUNK_SIZE_BYTES = 16 * 1024 * 1024; // 16 MB chunks for faster uploads

        videoInput.addEventListener("change", () => {

            if(videoInput.files.length > 0){

                fileName.textContent = videoInput.files[0].name;

            }

        });

        form.addEventListener("submit", (e) => {

            e.preventDefault();

            if(videoInput.files.length === 0){

                alert("Please upload a video first");
                return;

            }

            const selectedFile = videoInput.files[0];

            statusText.textContent = "Queued...";
            loader.style.display = "block";
            uploadInChunksAndProcess(selectedFile)
                .then(() => {
                    loader.style.display = "none";
                    statusText.textContent = "Download ready.";
                    fileName.textContent = "Done! Subtitle downloaded.";
                })
                .catch(error => {
                    loader.style.display = "none";
                    statusText.textContent = "";

                    const fallbackMessage = "Upload or processing failed on free hosting. Please retry.";
                    alert(error.message || fallbackMessage);

                    console.log(error);
                });

        });

        async function uploadInChunksAndProcess(selectedFile) {
            const initResponse = await fetch("/upload/init", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ filename: selectedFile.name })
            });
            const initPayload = await safeJson(initResponse);
            if (!initResponse.ok || !initPayload.upload_id) {
                throw new Error(initPayload.error || "Failed to initialize upload");
            }

            const uploadId = initPayload.upload_id;
            const totalChunks = Math.ceil(selectedFile.size / CHUNK_SIZE_BYTES);
            for (let index = 0; index < totalChunks; index += 1) {
                const start = index * CHUNK_SIZE_BYTES;
                const end = Math.min(start + CHUNK_SIZE_BYTES, selectedFile.size);
                const chunk = selectedFile.slice(start, end);
                const formData = new FormData();
                formData.append("chunk", chunk, `${selectedFile.name}.part${index}`);

                statusText.textContent = `Uploading chunks... ${index + 1}/${totalChunks}`;
                const chunkResponse = await fetch(`/upload/chunk/${uploadId}`, {
                    method: "POST",
                    body: formData
                });
                const chunkPayload = await safeJson(chunkResponse);
                if (!chunkResponse.ok) {
                    throw new Error(chunkPayload.error || "Chunk upload failed");
                }
            }

            statusText.textContent = "Upload complete. Starting transcription...";
            const completeResponse = await fetch(`/upload/complete/${uploadId}`, {
                method: "POST"
            });
            const completePayload = await safeJson(completeResponse);
            if (!completeResponse.ok || !completePayload.job_id) {
                throw new Error(completePayload.error || "Failed to start transcription");
            }

            statusText.textContent = "Processing...";
            await waitForJobAndDownload(completePayload.job_id);
        }

        async function waitForJobAndDownload(jobId) {
            let statusFailures = 0;
            for (let attempt = 0; attempt < MAX_POLL_TRIES; attempt += 1) {
                let response;
                let payload = {};
                try {
                    response = await fetch(`/job/${jobId}`);
                    payload = await safeJson(response);
                } catch (e) {
                    response = null;
                }

                if (!response || !response.ok) {
                    statusFailures += 1;
                    if (statusFailures >= MAX_STATUS_FAILURES) {
                        throw new Error(payload.error || "Unable to check job status. Please retry in a minute.");
                    }
                    statusText.textContent = `Connection issue while checking status... retrying (${statusFailures}/${MAX_STATUS_FAILURES})`;
                    await new Promise(resolve => setTimeout(resolve, POLL_INTERVAL_MS));
                    continue;
                }
                statusFailures = 0;

                if (payload.status === "done") {
                    statusText.textContent = "Download ready.";
                    const downloadUrl = payload.download_url || `/download/${jobId}`;
                    downloadFile(downloadUrl, videoInput.files[0].name);
                    return;
                }

                if (payload.status === "error") {
                    throw new Error(payload.error || "Transcription failed");
                }

                if (attempt > 0 && attempt % 8 === 0) {
                    statusText.textContent = "Still running... please wait.";
                } else if (payload.status === "processing") {
                    statusText.textContent = "Processing...";
                } else {
                    statusText.textContent = "Queued...";
                }

                await new Promise(resolve => setTimeout(resolve, POLL_INTERVAL_MS));
            }

            throw new Error("Processing took too long. Please try a shorter clip.");
        }

        function downloadFile(url, originalFileName) {
            const a = document.createElement("a");
            a.href = url;
            a.download = originalFileName.replace(/\.[^/.]+$/, "") + ".srt";
            document.body.appendChild(a);
            a.click();
            a.remove();
        }

        async function safeJson(response) {
            try {
                return await response.json();
            } catch (e) {
                return {};
            }
        }

    </script>

</body>
</html>
