<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Subtitle Generator</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: radial-gradient(circle at top, #2c2c3d 0%, #0e0e12 40%, #050507 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: #f4f4f8;
            font-smoothing: antialiased;
        }

        .background-glow {
            position: absolute;
            width: 700px;
            height: 700px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.18), transparent 65%);
            filter: blur(100px);
            top: -100px;
            right: -120px;
            z-index: 0;
        }

        .cursor-glow {
            position: absolute;
            width: 320px;
            height: 320px;
            pointer-events: none;
            border-radius: 50%;
            background: radial-gradient(circle at center, rgba(255, 255, 255, 0.32), rgba(255, 255, 255, 0.08) 30%, transparent 70%);
            box-shadow: 0 0 120px rgba(255, 255, 255, 0.16);
            filter: blur(24px);
            transform: translate(-50%, -50%) scale(0.95);
            transition: transform 0.18s ease-out, opacity 0.18s ease-out;
            opacity: 0;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            width: min(560px, calc(100vw - 40px));
            padding: 42px;
            background: rgba(12, 14, 26, 0.92);
            backdrop-filter: blur(22px);
            border: 1px solid rgba(255, 255, 255, 0.14);
            border-radius: 32px;
            text-align: center;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.35);
        }

        h1 {
            font-size: 44px;
            margin-bottom: 10px;
            font-weight: 800;
            letter-spacing: 0.02em;
        }

        p {
            color: #bdbdbd;
            margin-bottom: 35px;
            line-height: 1.5;
        }

        .upload-box {
            position: relative;
            width: 100%;
            min-height: 190px;
            border: 1px solid rgba(255, 255, 255, 0.18);
            background: rgba(255, 255, 255, 0.04);
            border-radius: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            cursor: pointer;
            transition: transform 0.28s ease, border-color 0.28s ease, background 0.28s ease;
            overflow: hidden;
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.03);
        }

        .upload-box:hover {
            border-color: rgba(255, 255, 255, 0.35);
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.06);
        }

        .upload-box.selected {
            border-color: #75b7ff;
            background: rgba(49, 115, 255, 0.08);
            box-shadow: 0 0 0 2px rgba(117, 183, 255, 0.12);
        }

        .upload-box input {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        .upload-icon {
            font-size: 54px;
            margin-bottom: 10px;
        }

        .upload-text {
            font-size: 16px;
            color: #d4d6e0;
            font-weight: 600;
        }

        .file-name {
            margin-top: 18px;
            color: #cbd0e2;
            font-size: 14px;
            word-break: break-all;
            padding: 10px 16px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.06);
            display: inline-flex;
            align-items: center;
            gap: 10px;
            border: 1px solid transparent;
            transition: background 0.28s ease, border-color 0.28s ease, color 0.28s ease;
        }

        .file-name.selected {
            background: rgba(117, 183, 255, 0.12);
            border-color: rgba(117, 183, 255, 0.28);
            color: #eaf3ff;
        }

        button {
            margin-top: 30px;
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 14px;
            background: white;
            color: black;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .loader {
            display: none;
            margin-top: 20px;
        }

        .status-text {
            margin-top: 12px;
            min-height: 20px;
            color: #cfcfcf;
            font-size: 14px;
        }

        .retry-btn {
            margin-top: 12px;
            padding: 10px 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.28s ease;
            display: none;
        }

        .retry-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .loader span {
            width: 12px;
            height: 12px;
            background: white;
            display: inline-block;
            border-radius: 50%;
            margin: 0 4px;
            animation: bounce 0.6s infinite alternate;
        }

        .loader span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .loader span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {
            from {
                transform: translateY(0);
                opacity: 0.5;
            }

            to {
                transform: translateY(-10px);
                opacity: 1;
            }
        }

        /* Subtitle mode selector */
        .mode-label {
            display: block;
            margin-top: 22px;
            margin-bottom: 10px;
            font-size: 14px;
            color: #aaa;
            text-align: left;
        }

        .mode-selector {
            display: flex;
            gap: 8px;
            width: 100%;
        }

        .mode-btn {
            flex: 1;
            min-width: 110px;
            padding: 14px 10px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.05);
            color: #c8cdd8;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.28s ease;
            text-align: center;
            line-height: 1.3;
            margin-top: 0;
            width: auto;
        }

        .mode-btn:hover {
            border-color: rgba(255, 255, 255, 0.35);
            color: #fff;
            background: rgba(255, 255, 255, 0.08);
        }

        .mode-btn.active {
            background: linear-gradient(135deg, #5da9ff 0%, #7dc8ff 100%);
            color: #07172e;
            border-color: rgba(255, 255, 255, 0.45);
            box-shadow: 0 10px 20px rgba(24, 99, 186, 0.2);
        }

        .mode-btn .mode-emoji {
            display: block;
            font-size: 18px;
            margin-bottom: 4px;
        }

        /* Progress bar for audio extraction */
        .progress-bar-container {
            margin-top: 16px;
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
            display: none;
        }

        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #888, #fff);
            border-radius: 3px;
            transition: width 0.3s ease;
        }
    </style>
</head>

<body>

    <div class="background-glow"></div>
    <div class="cursor-glow" id="cursorGlow"></div>

    <div class="container">

        <h1>बडबड AI</h1>

        <p>
            Upload your video and generate word-by-word subtitles in Hindi, English & Hinglish.
        </p>

        <form id="uploadForm">

            <label class="upload-box" id="uploadBox">

                <input type="file" id="videoInput" accept="video/*">

                <div class="upload-icon">🎬</div>

                <div class="upload-text">
                    Click to upload your video file
                </div>

            </label>

            <div class="file-name" id="fileName">
                No file selected
            </div>

            <div class="mode-label">Subtitle Style</div>
            <div class="mode-selector">
                <button type="button" class="mode-btn active" data-group="1" id="modeBtn1">
                    <span class="mode-emoji">🔤</span>
                    1 Word
                </button>
                <button type="button" class="mode-btn" data-group="4" id="modeBtn4">
                    <span class="mode-emoji">📝</span>
                    Up to 4 Words
                </button>
                <button type="button" class="mode-btn" data-group="6" id="modeBtn6">
                    <span class="mode-emoji">📄</span>
                    Up to 6 Words
                </button>
            </div>

            <button type="submit" id="submitBtn">
                Generate SRT
            </button>

            <div class="progress-bar-container" id="progressBarContainer">
                <div class="progress-bar-fill" id="progressBarFill"></div>
            </div>

            <div class="loader" id="loader">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <div class="status-text" id="statusText"></div>
            <button class="retry-btn" id="retryBtn">Retry Upload</button>

        </form>

    </div>

    <script>

        const videoInput = document.getElementById("videoInput");
        const uploadBox = document.getElementById("uploadBox");
        const cursorGlow = document.getElementById("cursorGlow");
        const fileName = document.getElementById("fileName");
        const loader = document.getElementById("loader");
        const statusText = document.getElementById("statusText");
        const form = document.getElementById("uploadForm");
        const submitBtn = document.getElementById("submitBtn");
        const progressBarContainer = document.getElementById("progressBarContainer");
        const progressBarFill = document.getElementById("progressBarFill");
        const modeBtns = document.querySelectorAll(".mode-btn");
        const retryBtn = document.getElementById("retryBtn");
        const POLL_INTERVAL_MS = 3000;
        const MAX_POLL_TRIES = 400;
        const MAX_STATUS_FAILURES = 20;
        const CHUNK_SIZE_BYTES = 16 * 1024 * 1024; // 16 MB chunks for faster uploads
        let selectedWordGroupSize = 1;
        let currentJobId = null;
        let currentSelectedFile = null;

        // Mode selector toggle
        modeBtns.forEach(btn => {
            btn.addEventListener("click", () => {
                modeBtns.forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
                selectedWordGroupSize = parseInt(btn.dataset.group, 10);
            });
        });

        videoInput.addEventListener("change", () => {
            if (videoInput.files.length > 0) {
                const file = videoInput.files[0];
                const sizeMB = (file.size / (1024 * 1024)).toFixed(1);
                fileName.textContent = `Selected: ${file.name} · ${sizeMB} MB`;
                uploadBox.classList.add("selected");
                fileName.classList.add("selected");
            } else {
                fileName.textContent = "No file selected";
                uploadBox.classList.remove("selected");
                fileName.classList.remove("selected");
            }
        });

        document.addEventListener("mousemove", (event) => {
            cursorGlow.style.opacity = "1";
            cursorGlow.style.left = `${event.clientX}px`;
            cursorGlow.style.top = `${event.clientY}px`;
            cursorGlow.style.transform = "translate(-50%, -50%) scale(1)";
        });

        document.addEventListener("mouseleave", () => {
            cursorGlow.style.opacity = "0";
        });

        document.addEventListener("touchmove", (event) => {
            if (event.touches.length > 0) {
                const touch = event.touches[0];
                cursorGlow.style.opacity = "1";
                cursorGlow.style.left = `${touch.clientX}px`;
                cursorGlow.style.top = `${touch.clientY}px`;
                cursorGlow.style.transform = "translate(-50%, -50%) scale(1)";
            }
        }, { passive: true });

        document.addEventListener("touchend", () => {
            cursorGlow.style.opacity = "0";
        });

        form.addEventListener("submit", (e) => {

            e.preventDefault();

            if (videoInput.files.length === 0) {

                alert("Please upload a video first");
                return;

            }

            currentSelectedFile = videoInput.files[0];
            startProcessing(currentSelectedFile);

        });

        retryBtn.addEventListener("click", () => {
            if (currentSelectedFile) {
                retryBtn.style.display = "none";
                startProcessing(currentSelectedFile);
            }
        });

        function startProcessing(selectedFile) {
            retryBtn.style.display = "none";
            statusText.textContent = "Extracting audio from video in browser...";
            loader.style.display = "block";
            submitBtn.disabled = true;
            progressBarContainer.style.display = "block";
            progressBarFill.style.width = "0%";

            extractAudioFromVideo(selectedFile)
                .then(audioBlob => {
                    const audioSizeMB = (audioBlob.size / (1024 * 1024)).toFixed(1);
                    const videoSizeMB = (selectedFile.size / (1024 * 1024)).toFixed(1);
                    statusText.textContent = `Audio extracted! ${videoSizeMB} MB video → ${audioSizeMB} MB audio. Uploading...`;
                    progressBarContainer.style.display = "none";

                    // Use the original video filename but with .wav extension for the server
                    const audioFileName = selectedFile.name.replace(/\.[^/.]+$/, "") + ".wav";

                    return uploadInChunksAndProcess(audioBlob, audioFileName, selectedFile.name, selectedWordGroupSize);
                })
                .then(() => {
                    loader.style.display = "none";
                    statusText.textContent = "Download ready.";
                    fileName.textContent = "Done! Subtitle downloaded.";
                    submitBtn.disabled = false;
                    retryBtn.style.display = "none";
                })
                .catch(error => {
                    loader.style.display = "none";
                    progressBarContainer.style.display = "none";
                    statusText.textContent = "";
                    submitBtn.disabled = false;

                    const fallbackMessage = "Upload or processing failed on free hosting. Please retry.";
                    alert(error.message || fallbackMessage);

                    console.log(error);
                });
        }

        /**
         * Extract audio from a video file using the Web Audio API.
         * Returns a WAV Blob containing the audio track.
         */
        async function extractAudioFromVideo(videoFile) {
            statusText.textContent = "Reading video file...";
            progressBarFill.style.width = "10%";

            // Read the file as an ArrayBuffer
            const arrayBuffer = await videoFile.arrayBuffer();

            statusText.textContent = "Decoding audio from video (this may take a moment)...";
            progressBarFill.style.width = "30%";

            // Decode the audio using Web Audio API
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();

            let audioBuffer;
            try {
                audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
            } catch (decodeError) {
                // If the browser can't decode the audio, fall back to uploading the original video
                console.warn("Browser could not decode audio, falling back to video upload:", decodeError);
                audioContext.close();
                throw new Error(
                    "Your browser could not extract audio from this video format. " +
                    "Try a different browser (Chrome works best) or convert your video to MP4 first."
                );
            }

            statusText.textContent = "Encoding audio as WAV...";
            progressBarFill.style.width = "70%";

            // Encode as WAV — downsample to 16kHz mono (Whisper's preferred format)
            const wavBlob = audioBufferToWav(audioBuffer, 16000);

            progressBarFill.style.width = "100%";
            audioContext.close();

            return wavBlob;
        }

        /**
         * Convert an AudioBuffer to a WAV Blob.
         * Downsamples to targetSampleRate and mixes to mono for Whisper.
         */
        function audioBufferToWav(audioBuffer, targetSampleRate) {
            // Mix down to mono
            const numberOfChannels = audioBuffer.numberOfChannels;
            const originalSampleRate = audioBuffer.sampleRate;
            const originalLength = audioBuffer.length;

            // Get mono channel data (average all channels)
            let monoData;
            if (numberOfChannels === 1) {
                monoData = audioBuffer.getChannelData(0);
            } else {
                monoData = new Float32Array(originalLength);
                for (let ch = 0; ch < numberOfChannels; ch++) {
                    const channelData = audioBuffer.getChannelData(ch);
                    for (let i = 0; i < originalLength; i++) {
                        monoData[i] += channelData[i];
                    }
                }
                for (let i = 0; i < originalLength; i++) {
                    monoData[i] /= numberOfChannels;
                }
            }

            // Downsample to target sample rate using linear interpolation
            let finalData;
            if (originalSampleRate !== targetSampleRate) {
                const ratio = originalSampleRate / targetSampleRate;
                const newLength = Math.round(originalLength / ratio);
                finalData = new Float32Array(newLength);
                for (let i = 0; i < newLength; i++) {
                    const srcIndex = i * ratio;
                    const srcIndexFloor = Math.floor(srcIndex);
                    const srcIndexCeil = Math.min(srcIndexFloor + 1, originalLength - 1);
                    const frac = srcIndex - srcIndexFloor;
                    finalData[i] = monoData[srcIndexFloor] * (1 - frac) + monoData[srcIndexCeil] * frac;
                }
            } else {
                finalData = monoData;
            }

            // Convert float32 samples to 16-bit PCM
            const numSamples = finalData.length;
            const bytesPerSample = 2;
            const dataLength = numSamples * bytesPerSample;
            const buffer = new ArrayBuffer(44 + dataLength);
            const view = new DataView(buffer);

            // WAV header
            writeString(view, 0, 'RIFF');
            view.setUint32(4, 36 + dataLength, true);
            writeString(view, 8, 'WAVE');
            writeString(view, 12, 'fmt ');
            view.setUint32(16, 16, true);               // chunk size
            view.setUint16(20, 1, true);                 // PCM format
            view.setUint16(22, 1, true);                 // mono
            view.setUint32(24, targetSampleRate, true);   // sample rate
            view.setUint32(28, targetSampleRate * bytesPerSample, true); // byte rate
            view.setUint16(32, bytesPerSample, true);    // block align
            view.setUint16(34, 16, true);                // bits per sample
            writeString(view, 36, 'data');
            view.setUint32(40, dataLength, true);

            // Write PCM samples
            let offset = 44;
            for (let i = 0; i < numSamples; i++) {
                let sample = finalData[i];
                // Clamp
                sample = Math.max(-1, Math.min(1, sample));
                // Convert to 16-bit integer
                view.setInt16(offset, sample < 0 ? sample * 0x8000 : sample * 0x7FFF, true);
                offset += 2;
            }

            return new Blob([buffer], { type: 'audio/wav' });
        }

        function writeString(view, offset, string) {
            for (let i = 0; i < string.length; i++) {
                view.setUint8(offset + i, string.charCodeAt(i));
            }
        }

        /**
         * Upload a blob (audio) in chunks and start processing.
         * originalVideoName is kept for naming the final SRT file.
         */
        async function uploadInChunksAndProcess(audioBlob, audioFileName, originalVideoName, wordGroupSize) {
            const initResponse = await fetch("/upload/init", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ filename: audioFileName, word_group_size: wordGroupSize || 1 })
            });
            const initPayload = await safeJson(initResponse);
            if (!initResponse.ok || !initPayload.upload_id) {
                throw new Error(initPayload.error || "Failed to initialize upload");
            }

            const uploadId = initPayload.upload_id;
            const totalChunks = Math.ceil(audioBlob.size / CHUNK_SIZE_BYTES);
            for (let index = 0; index < totalChunks; index += 1) {
                const start = index * CHUNK_SIZE_BYTES;
                const end = Math.min(start + CHUNK_SIZE_BYTES, audioBlob.size);
                const chunk = audioBlob.slice(start, end);
                const formData = new FormData();
                formData.append("chunk", chunk, `${audioFileName}.part${index}`);

                statusText.textContent = `Uploading audio... ${index + 1}/${totalChunks}`;
                const chunkResponse = await fetch(`/upload/chunk/${uploadId}`, {
                    method: "POST",
                    body: formData
                });
                const chunkPayload = await safeJson(chunkResponse);
                if (!chunkResponse.ok) {
                    throw new Error(chunkPayload.error || "Chunk upload failed");
                }
            }

            statusText.textContent = "Upload complete. Starting transcription...";
            const completeResponse = await fetch(`/upload/complete/${uploadId}`, {
                method: "POST"
            });
            const completePayload = await safeJson(completeResponse);
            if (!completeResponse.ok || !completePayload.job_id) {
                throw new Error(completePayload.error || "Failed to start transcription");
            }

            statusText.textContent = "Processing...";
            await waitForJobAndDownload(completePayload.job_id, originalVideoName);
        }

        async function waitForJobAndDownload(jobId, originalVideoName) {
            currentJobId = jobId;
            let statusFailures = 0;
            for (let attempt = 0; attempt < MAX_POLL_TRIES; attempt += 1) {
                let response;
                let payload = {};
                try {
                    response = await fetch(`/job/${jobId}`);
                    payload = await safeJson(response);
                } catch (e) {
                    response = null;
                }

                if (!response || !response.ok) {
                    statusFailures += 1;
                    if (statusFailures >= MAX_STATUS_FAILURES) {
                        throw new Error(payload.error || "Unable to check job status. Please retry in a minute.");
                    }
                    statusText.textContent = `Connection issue while checking status... retrying (${statusFailures}/${MAX_STATUS_FAILURES})`;
                    await new Promise(resolve => setTimeout(resolve, POLL_INTERVAL_MS));
                    continue;
                }
                statusFailures = 0;

                if (payload.status === "done") {
                    statusText.textContent = "Download ready.";
                    const downloadUrl = payload.download_url || `/download/${jobId}`;
                    downloadFile(downloadUrl, originalVideoName);
                    return;
                }

                if (payload.status === "error") {
                    const errorMsg = payload.error || "Transcription failed";
                    if (errorMsg.includes("Server restarted")) {
                        statusText.textContent = "Server restarted during processing.";
                        retryBtn.style.display = "block";
                        loader.style.display = "none";
                        submitBtn.disabled = false;
                        return;
                    } else {
                        throw new Error(errorMsg);
                    }
                }

                if (attempt > 0 && attempt % 8 === 0) {
                    statusText.textContent = "Still running... please wait.";
                } else if (payload.status === "processing") {
                    statusText.textContent = "Processing...";
                } else {
                    statusText.textContent = "Queued...";
                }

                await new Promise(resolve => setTimeout(resolve, POLL_INTERVAL_MS));
            }

            throw new Error("Processing took too long. Please try a shorter clip.");
        }

        function downloadFile(url, originalFileName) {
            const a = document.createElement("a");
            a.href = url;
            a.download = originalFileName.replace(/\.[^/.]+$/, "") + ".srt";
            document.body.appendChild(a);
            a.click();
            a.remove();
        }

        async function safeJson(response) {
            try {
                return await response.json();
            } catch (e) {
                return {};
            }
        }

    </script>

</body>

</html>
