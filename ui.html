<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Subtitle Generator</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#0f0f0f;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            overflow:hidden;
            color:white;
        }

        .background-glow{
            position:absolute;
            width:600px;
            height:600px;
            background:radial-gradient(circle, rgba(255,255,255,0.15), transparent 70%);
            filter:blur(80px);
            z-index:0;
        }

        .container{
            position:relative;
            z-index:1;
            width:500px;
            padding:40px;
            background:rgba(28,28,28,0.8);
            backdrop-filter:blur(20px);
            border:1px solid rgba(255,255,255,0.1);
            border-radius:30px;
            text-align:center;
            box-shadow:0 0 40px rgba(0,0,0,0.5);
        }

        h1{
            font-size:42px;
            margin-bottom:10px;
            font-weight:700;
        }

        p{
            color:#bdbdbd;
            margin-bottom:35px;
            line-height:1.5;
        }

        .upload-box{
            position:relative;
            width:100%;
            height:180px;
            border:2px dashed rgba(255,255,255,0.15);
            border-radius:20px;
            display:flex;
            justify-content:center;
            align-items:center;
            flex-direction:column;
            cursor:pointer;
            transition:0.3s;
            overflow:hidden;
        }

        .upload-box:hover{
            border-color:white;
            transform:scale(1.01);
        }

        .upload-box input{
            position:absolute;
            width:100%;
            height:100%;
            opacity:0;
            cursor:pointer;
        }

        .upload-icon{
            font-size:55px;
            margin-bottom:10px;
        }

        .upload-text{
            font-size:16px;
            color:#d0d0d0;
        }

        .file-name{
            margin-top:18px;
            color:#8f8f8f;
            font-size:14px;
            word-break:break-all;
        }

        button{
            margin-top:30px;
            width:100%;
            padding:16px;
            border:none;
            border-radius:14px;
            background:white;
            color:black;
            font-size:17px;
            font-weight:bold;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            transform:translateY(-2px);
        }

        .loader{
            display:none;
            margin-top:20px;
        }

        .loader span{
            width:12px;
            height:12px;
            background:white;
            display:inline-block;
            border-radius:50%;
            margin:0 4px;
            animation:bounce 0.6s infinite alternate;
        }

        .loader span:nth-child(2){
            animation-delay:0.2s;
        }

        .loader span:nth-child(3){
            animation-delay:0.4s;
        }

        @keyframes bounce{
            from{
                transform:translateY(0);
                opacity:0.5;
            }

            to{
                transform:translateY(-10px);
                opacity:1;
            }
        }

    </style>
</head>
<body>

    <div class="background-glow"></div>

    <div class="container">

        <h1>बडबड AI</h1>

        <p>
            Upload your video and generate word-by-word subtitles in Hindi, English & Hinglish.
        </p>

        <form id="uploadForm">

            <label class="upload-box">

                <input 
                    type="file" 
                    id="videoInput"
                    accept="video/*"
                >

                <div class="upload-icon">🎬</div>

                <div class="upload-text">
                    Click to Upload Video
                </div>

            </label>

            <div class="file-name" id="fileName">
                No file selected
            </div>

            <button type="submit">
                Generate SRT
            </button>

            <div class="loader" id="loader">
                <span></span>
                <span></span>
                <span></span>
            </div>

        </form>

    </div>

    <script>

        const videoInput = document.getElementById("videoInput");
        const fileName = document.getElementById("fileName");
        const loader = document.getElementById("loader");
        const form = document.getElementById("uploadForm");

        videoInput.addEventListener("change", () => {

            if(videoInput.files.length > 0){

                fileName.textContent = videoInput.files[0].name;

            }

        });

        form.addEventListener("submit", (e) => {

            e.preventDefault();

            if(videoInput.files.length === 0){

                alert("Please upload a video first");
                return;

            }

            loader.style.display = "block";

            const formData = new FormData();

formData.append(
    "video",
    videoInput.files[0]
);

fetch("/upload", {

    method: "POST",
    body: formData

})
.then(async response => {
    if (!response.ok) {
        let message = "Error generating subtitles";
        try {
            const payload = await response.json();
            if (payload.error) {
                message = payload.error;
            }
        } catch (e) {
            // Keep default message if response is not JSON.
        }
        throw new Error(message);
    }
    return response.blob();
})
.then(blob => {

    loader.style.display = "none";

    const url = window.URL.createObjectURL(blob);

    const a = document.createElement("a");

    a.href = url;

    a.download = videoInput.files[0].name.replace(/\.[^/.]+$/, "") + ".srt";

    document.body.appendChild(a);

    a.click();

    a.remove();

})
.catch(error => {

    loader.style.display = "none";

    alert(error.message || "Error generating subtitles");

    console.log(error);

});

        });

    </script>

</body>
</html>
